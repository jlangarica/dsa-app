<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrador de Compras DSA</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 16px; background: #f5f7fb; color: #1f2937; }
      .card { max-width: 980px; margin: 0 auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
      h1 { margin-top: 0; font-size: 24px; color: #2563eb; }
      .ocr-box { background: #eff6ff; padding: 16px; border-radius: 8px; margin-bottom: 20px; border: 2px dashed #bfdbfe; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
      label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; }
      input, textarea, select { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; background: white; }
      textarea { min-height: 70px; resize: vertical; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { border: 1px solid #e5e7eb; padding: 8px; text-align: left; }
      th { background: #f8fafc; font-size: 12px; }
      .actions { display: flex; gap: 10px; align-items: center; margin-top: 16px; }
      button { padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
      .primary { background: #2563eb; color: white; }
      .primary:disabled { background: #93c5fd; cursor: not-allowed; }
      .ai-btn { background: #8b5cf6; color: white; margin-top: 6px; }
      .ai-btn:disabled { background: #ddd6fe; }
      .secondary { background: #e2e8f0; color: #0f172a; }
      .muted { color: #64748b; font-size: 12px; }
      .loading-overlay { background: rgba(255,255,255,0.8); position: fixed; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; font-weight:bold; font-size:18px; z-index: 999; }
    </style>
  </head>
  <body>
    <div id="loader" class="loading-overlay">⏳ Sincronizando catálogos con Supabase...</div>

    <div class="card">
      <h1>Registrador de Compras DSA</h1>
      <p class="muted">Sube tu Oficio de Solicitud escaneado para pre-llenar los campos con Inteligencia Artificial o captura manualmente.</p>

      <div class="ocr-box">
        <label style="color:#1e40af; font-size:13px;" for="pdfFile">📁 Escanear e Instanciar mediante Oficio (PDF)</label>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px;">
          <input type="file" id="pdfFile" accept="application/pdf" style="max-width: 350px;">
          <button type="button" id="btnGemini" class="ai-btn" onclick="procesarOficioConIA()">🤖 Analizar Oficio con Gemini AI</button>
        </div>
      </div>

      <form id="dsaForm">
        <div class="grid">
          <div>
            <label for="folio_dsa">Folio DSA *</label>
            <input id="folio_dsa" name="folio_dsa" required placeholder="Ej: DSA-2026-001">
          </div>
          <div>
            <label for="id_tramite">Tipo de Trámite</label>
            <select id="id_tramite" name="id_tramite">
              <option value="">Seleccione...</option>
            </select>
          </div>
          <div>
            <label for="id_uc">Unidad Solicitante</label>
            <select id="id_uc" name="id_uc">
              <option value="">Seleccione...</option>
            </select>
          </div>
          <div>
            <label for="fecha_recepcion">Fecha Recepción</label>
            <input id="fecha_recepcion" name="fecha_recepcion" type="date">
          </div>
          <div>
            <label for="id_servicio">Servicio Relacionado</label>
            <select id="id_servicio" name="id_servicio">
              <option value="">Seleccione...</option>
            </select>
          </div>
          <div>
            <label for="no_oficio">No. Oficio</label>
            <input id="no_oficio" name="no_oficio">
          </div>
          <div>
            <label for="id_usuario">Usuario Responsable</label>
            <select id="id_usuario" name="id_usuario">
              <option value="">Seleccione...</option>
            </select>
          </div>
          <div>
            <label for="id_estatus_tramite">Estatus del Trámite</label>
            <select id="id_estatus_tramite" name="id_estatus_tramite">
              <option value="">Seleccione...</option>
            </select>
          </div>
        </div>

        <div style="margin-top:12px;">
          <label for="observaciones">Observaciones</label>
          <textarea id="observaciones" name="observaciones"></textarea>
        </div>

        <div style="margin-top:16px;">
          <h3 style="margin-bottom:8px;">Artículos Solicitados</h3>
          <table>
            <thead>
              <tr>
                <th style="width: 40%;">Artículo (Catálogo) *</th>
                <th style="width: 15%;">Cantidad *</th>
                <th style="width: 25%;">Paciente Asignado</th>
                <th style="width: 15%;">Precio Unitario *</th>
                <th style="width: 5%;"></th>
              </tr>
            </thead>
            <tbody id="tablaDetalles"></tbody>
          </table>
          <div style="margin-top:8px;">
            <button type="button" class="secondary" onclick="agregarFilaArticulo()">➕ Agregar artículo</button>
          </div>
        </div>

        <div class="actions">
          <button id="btnGuardar" class="primary" type="submit">💾 Guardar Compra en Supabase</button>
          <button type="button" class="secondary" onclick="limpiarFormulario()">🧹 Limpiar Todo</button>
        </div>
      </form>
    </div>

    <script>
      var cacheCatalogo = [];
      var cachePacientes = [];

      window.onload = function() {
        document.getElementById('dsaForm').addEventListener('submit', enviarFormulario);
        google.script.run
          .withSuccessHandler(inicializarInterfaz)
          .withFailureHandler(function(err) { alert('❌ Falla de inicio: ' + err.message); })
          .obtenerDatosIniciales();
      };

      function inicializarInterfaz(datos) {
        poblarDesplegable('id_tramite', datos.tramites, 'id_tramite', 'tipo_tramite');
        var listaUnidades = datos.unidades.map(function(u) { return { id: u.id_uc, texto: u.uc_cod + ' - ' + u.uc_denominacion }; });
        poblarDesplegable('id_uc', listaUnidades, 'id', 'texto');
        poblarDesplegable('id_servicio', datos.servicios, 'id_servicio', 'nombre');
        poblarDesplegable('id_usuario', datos.usuarios, 'id_usuario', 'nombre');
        poblarDesplegable('id_estatus_tramite', datos.estatus, 'id_estatus_tramite', 'estatus_tramite');

        cacheCatalogo = datos.catalogo || [];
        cachePacientes = datos.pacientes || [];

        document.getElementById('loader').style.display = 'none';
        agregarFilaArticulo();
      }

      function poblarDesplegable(elementId, dataset, valueKey, textKey) {
        var select = document.getElementById(elementId);
        dataset.forEach(function(item) {
          var opt = document.createElement('option');
          opt.value = item[valueKey];
          opt.innerText = item[textKey];
          select.appendChild(opt);
        });
      }

      function procesarOficioConIA() {
        var fileInput = document.getElementById('pdfFile');
        if (!fileInput.files || fileInput.files.length === 0) {
          alert('⚠️ Por favor, selecciona primero un archivo PDF escaner.');
          return;
        }

        var file = fileInput.files[0];
        var reader = new FileReader();
        var btn = document.getElementById('btnGemini');
        btn.disabled = true;
        btn.innerText = '🤖 Extrayendo texto y analizando con IA...';

        reader.onload = function(e) {
          var dataUrl = e.target.result;
          var base64Data = dataUrl.split(',')[1];

          google.script.run
            .withSuccessHandler(function(resultadoIA) {
              alert('🤖 ¡OCR Exitoso! Rellenando el formulario estructurado automáticamente.');
              if (resultadoIA.folio_dsa) document.getElementById('folio_dsa').value = resultadoIA.folio_dsa;
              if (resultadoIA.no_oficio) document.getElementById('no_oficio').value = resultadoIA.no_oficio;
              if (resultadoIA.fecha_recepcion) document.getElementById('fecha_recepcion').value = resultadoIA.fecha_recepcion;
              if (resultadoIA.observaciones) document.getElementById('observaciones').value = resultadoIA.observaciones;

              if (resultadoIA.articulos && resultadoIA.articulos.length > 0) {
                document.getElementById('tablaDetalles').innerHTML = '';
                resultadoIA.articulos.forEach(function(art) {
                  agregarFilaArticuloConValores(art.codigo_art, art.cantidad, art.precio_unitario);
                });
              }

              btn.disabled = false;
              btn.innerText = '🤖 Analizar Oficio con Gemini AI';
            })
            .withFailureHandler(function(error) {
              alert('❌ Error al leer el PDF con Gemini: ' + error.message);
              btn.disabled = false;
              btn.innerText = '🤖 Analizar Oficio con Gemini AI';
            })
            .analizarPdfConGemini(base64Data);
        };
        reader.readAsDataURL(file);
      }

      function agregarFilaArticulo() {
        agregarFilaArticuloConValores('', 1, '');
      }

      function agregarFilaArticuloConValores(codigo, cantidad, precio) {
        var tbody = document.getElementById('tablaDetalles');
        var row = document.createElement('tr');
        row.className = 'fila-articulo';

        var optCatalogo = ['<option value="">Seleccione un artículo...</option>'];
        cacheCatalogo.forEach(function(art) {
          var selected = art.codigo_art === codigo ? 'selected' : '';
          optCatalogo.push('<option value="' + art.codigo_art + '" ' + selected + '>' + art.codigo_art + ' - ' + art.descripcion + '</option>');
        });

        var optPacientes = ['<option value="">Ninguno / General</option>'];
        cachePacientes.forEach(function(pac) {
          optPacientes.push('<option value="' + pac.id_paciente + '">' + pac.nombre_completo + '</option>');
        });

        row.innerHTML = [
          '<td><select name="codigo_art" required onchange="detectarCambioArticulo(this)">' + optCatalogo.join('') + '</select></td>',
          '<td><input type="number" name="cantidad" min="1" value="' + (cantidad || 1) + '" required></td>',
          '<td><select name="id_paciente">' + optPacientes.join('') + '</select></td>',
          '<td><input type="number" step="0.01" name="precio_unitario" value="' + (precio || '') + '" required></td>',
          '<td><button type="button" style="background:none; color:red; font-size:14px;" onclick="eliminarFila(this)">❌</button></td>'
        ].join('');
        
        tbody.appendChild(row);
      }

      function detectarCambioArticulo(selectElement) {
        var codigoSeleccionado = selectElement.value;
        var fila = selectElement.closest('tr');
        var inputPrecio = fila.querySelector('[name="precio_unitario"]');
        var articuloEncontrado = cacheCatalogo.find(function(art) { return art.codigo_art === codigoSeleccionado; });
        if (articuloEncontrado) {
          inputPrecio.value = articuloEncontrado.precio_sin_iva;
        } else {
          inputPrecio.value = '';
        }
      }

      function eliminarFila(btn) {
        var filas = document.getElementsByClassName('fila-articulo');
        if (filas.length > 1) { btn.closest('tr').remove(); } 
        else { alert('⚠️ El trámite debe contener al menos un artículo.'); }
      }

      function limpiarFormulario() {
        document.getElementById('dsaForm').reset();
        document.getElementById('pdfFile').value = '';
        document.getElementById('tablaDetalles').innerHTML = '';
        agregarFilaArticulo();
      }

      function enviarFormulario(event) {
        event.preventDefault();
        var btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerText = 'Procesando e Insertando...';

        var cabecera = {
          folio_dsa: document.getElementById('folio_dsa').value,
          id_tramite: document.getElementById('id_tramite').value ? Number(document.getElementById('id_tramite').value) : null,
          id_uc: document.getElementById('id_uc').value ? Number(document.getElementById('id_uc').value) : null,
          fecha_recepcion: document.getElementById('fecha_recepcion').value || null,
          id_servicio: document.getElementById('id_servicio').value ? Number(document.getElementById('id_servicio').value) : null,
          no_oficio: document.getElementById('no_oficio').value || null,
          id_usuario: document.getElementById('id_usuario').value ? Number(document.getElementById('id_usuario').value) : null,
          id_estatus_tramite: document.getElementById('id_estatus_tramite').value ? Number(document.getElementById('id_estatus_tramite').value) : null,
          observaciones: document.getElementById('observaciones').value || null
        };

        var detalles = [];
        var filas = document.getElementsByClassName('fila-articulo');
        for (var i = 0; i < filas.length; i++) {
          var fila = filas[i];
          detalles.push({
            codigo_art: fila.querySelector('[name="codigo_art"]').value,
            cantidad: Number(fila.querySelector('[name="cantidad"]').value),
            id_paciente: fila.querySelector('[name="id_paciente"]').value ? Number(fila.querySelector('[name="id_paciente"]').value) : null,
            precio_unitario: Number(fila.querySelector('[name="precio_unitario"]').value)
          });
        }

        google.script.run
          .withSuccessHandler(function(folioConfirmado) {
            alert('✅ ¡Éxito total! Compra guardada en Supabase con el Folio: ' + folioConfirmado);
            limpiarFormulario();
            btn.disabled = false;
            btn.innerText = '💾 Guardar Compra en Supabase';
          })
          .withFailureHandler(function(error) {
            alert('❌ Error al guardar datos: ' + error.message);
            btn.disabled = false;
            btn.innerText = '💾 Guardar Compra en Supabase';
          })
          .guardarCompraDesdeForm({ cabecera: cabecera, detalles: detalles });
      }
    </script>
  </body>
</html>
